<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zeke Daley Campaign For Independent Of Cowper</title>
    <link rel="icon" type="image/png" href="favicon.ico" />
    <link rel="stylesheet" href="Stylesheet.css" />
    <base target="_self" />
    <script src="Functions.js"></script>
    <style>
      .intro-div {
        align-items: flex-start;
        padding-left: 10%;
        padding-top: 0.2cm;
      }
      .intro-paragraph {
        color: black;
      }
    </style>
  </head>
  <body>
    <label class="dropdown-checkbox">
      <input
        type="checkbox"
        id="Dropdown-Check"
        onclick="dropdown()"
        style="opacity: 0"
      />
      <p class="intro-paragraph">text goes here I guess</p>
      <svg
        class="dropdown-svg"
        style="opacity: 100%"
        id="dropdown-svg"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 384 512"
      >
        <path
          d="M73 39c-14.8-9.1-33.4-9.4-48.5-.9S0 62.6 0 80L0 432c0 17.4 9.4 33.4 24.5 41.9s33.7 8.1 48.5-.9L361 297c14.3-8.7 23-24.2 23-41s-8.7-32.2-23-41L73 39z"
        />
      </svg>
    </label>
    <script>
      function hidemenu(x) {
        function dropdown() {
          var checkBox = document.getElementById("Test-check");
          if (checkBox.checked == true) {
            document.getElementById("dropdown-arrow").style.width = "100%";
          } else {
            document.getElementById("dropdown-arrow").style.width = "0";
          }
        }
      }

      // Call listener function at run time
      hidemenu(x);

      // Attach listener function on state changes
      x.addEventListener("change", function () {
        hidemenu(x);
      });

      function hidedropdown(x) {
        function dropdown() {
          var checkBox = document.getElementById("Dropdown-Check");
          if (checkBox.checked == true) {
            document.getElementById("dropdown-arrow").style.transform =
              "rotate(90deg)";
          } else {
            document.getElementById("dropdown-arrow").style.transform =
              "rotate(0deg)";
          }
        }
      }
    </script>
  </body>
</html>
