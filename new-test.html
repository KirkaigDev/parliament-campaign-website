<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zeke Daley Campaign For Independent Of Cowper</title>
    <link rel="icon" type="image/png" href="favicon.ico" />
    <link rel="stylesheet" href="Stylesheet.css" />
    <base target="_self" />
    <script src="Functions.js"></script>
    <style>
      .intro-div {
        align-items: flex-start;
        padding-left: 10%;
        padding-top: 0.2cm;
      }
      .intro-paragraph {
        color: black;
      }
    </style>
  </head>
  <body>
    <div class="main-div">
      <div
        class="intro-div"
        style="
          background-image: linear-gradient(
            150deg,
            rgb(105, 105, 255),
            rgb(105, 105, 255)
          );
        "
      >
        <a class="intro-subtitle">
            <label class="dropdown-menu">
              <input
                type="checkbox"
                id="Dropdown-Check"
                onclick="dropdown()"
              />Who are your preferences
              <svg class="dropdown-menu" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512"> <path d="M73 39c-14.8-9.1-33.4-9.4-48.5-.9S0 62.6 0 80L0 432c0 17.4 9.4 33.4 24.5 41.9s33.7 8.1 48.5-.9L361 297c14.3-8.7 23-24.2 23-41s-8.7-32.2-23-41L73 39z"/></svg>
            </label>
        </a>
      </div>
    </div>
    <script>
      function hidemenu(x) {
        function dropdown() {
          var checkBox = document.getElementById("Test-check");
          if (checkBox.checked == true) {
            document.getElementById("dropdown-arrow").style.width = "100%";
          } else {
            document.getElementById("dropdown-arrow").style.width = "0";
          }
        }
      }

      // Call listener function at run time
      hidemenu(x);

      // Attach listener function on state changes
      x.addEventListener("change", function () {
        hidemenu(x);
      });

      function hidedropdown(x) {
        function dropdown() {
          var checkBox = document.getElementById("Dropdown-Check");
          if (checkBox.checked == true) {
            document.getElementById("dropdown-arrow").style.transform =
              "rotate(90deg)";
          } else {
            document.getElementById("dropdown-arrow").style.transform =
              "rotate(0deg)";
          }
        }
      };
    </script>
  </body>
</html>
